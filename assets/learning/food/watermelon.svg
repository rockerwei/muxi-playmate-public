<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="一顆大西瓜">
  <title>Watermelon</title>
  <ellipse cx="60" cy="108" rx="30" ry="7" fill="rgba(0,0,0,0.10)"/>
  <!-- outer rind (whole watermelon) -->
  <ellipse cx="60" cy="62" rx="44" ry="36" fill="#4aaa30"/>
  <!-- stripe pattern -->
  <ellipse cx="60" cy="62" rx="44" ry="36" fill="none" stroke="#3a9020" stroke-width="0"/>
  <path d="M20 50 Q60 30 100 50" stroke="#3a9020" stroke-width="4" fill="none"/>
  <path d="M16 62 Q60 40 104 62" stroke="#3a9020" stroke-width="4" fill="none"/>
  <path d="M18 74 Q60 55 102 74" stroke="#3a9020" stroke-width="4" fill="none"/>
  <!-- cut face (half watermelon) -->
  <ellipse cx="60" cy="68" rx="38" ry="30" fill="#EC3440"/>
  <!-- white rind ring -->
  <ellipse cx="60" cy="68" rx="38" ry="30" fill="none" stroke="#F0F8EC" stroke-width="8"/>
  <!-- light pink inner -->
  <ellipse cx="60" cy="68" rx="30" ry="24" fill="#F05060"/>
  <!-- seeds -->
  <ellipse cx="50" cy="60" rx="4" ry="2.5" fill="#1a1a1a" transform="rotate(-20 50 60)"/>
  <ellipse cx="66" cy="56" rx="4" ry="2.5" fill="#1a1a1a" transform="rotate(10 66 56)"/>
  <ellipse cx="78" cy="66" rx="4" ry="2.5" fill="#1a1a1a" transform="rotate(-5 78 66)"/>
  <ellipse cx="45" cy="74" rx="4" ry="2.5" fill="#1a1a1a" transform="rotate(25 45 74)"/>
  <ellipse cx="64" cy="76" rx="4" ry="2.5" fill="#1a1a1a" transform="rotate(-15 64 76)"/>
  <ellipse cx="75" cy="80" rx="4" ry="2.5" fill="#1a1a1a" transform="rotate(5 75 80)"/>
  <!-- highlight -->
  <ellipse cx="44" cy="58" rx="8" ry="5" fill="rgba(255,255,255,0.20)" transform="rotate(-15 44 58)"/>
</svg>
