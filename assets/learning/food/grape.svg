  <circle cx="60" cy="34" r="14" fill="#8E24AA"/>
  <circle cx="76" cy="38" r="14" fill="#7B1FA2"/>
  <!-- highlights top row -->
  <circle cx="40" cy="32" r="5" fill="rgba(255,255,255,0.35)"/>
  <circle cx="56" cy="28" r="5" fill="rgba(255,255,255,0.35)"/>
  <circle cx="72" cy="32" r="5" fill="rgba(255,255,255,0.35)"/>
  <!-- middle row (3) -->
  <circle cx="36" cy="62" r="14" fill="#8E24AA"/>
