<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="一個玻璃罐">
  <title>Jar</title>
  <ellipse cx="60" cy="108" rx="22" ry="6" fill="rgba(0,0,0,0.10)"/>
  <!-- jar shadow/base -->
  <ellipse cx="60" cy="103" rx="24" ry="6" fill="#D0C8B8" opacity="0.4"/>
  <!-- jar body -->
  <rect x="36" y="52" width="48" height="52" rx="10" fill="#E8F4F8"/>
  <rect x="36" y="52" width="48" height="52" rx="10" fill="none" stroke="#B8D0D8" stroke-width="2"/>
  <!-- jar contents (jam/honey) -->
  <rect x="38" y="72" width="44" height="30" rx="0" fill="#F0A030" opacity="0.85"/>
  <rect x="38" y="70" width="44" height="8" rx="0" fill="#F8B840" opacity="0.6"/>
  <!-- jar neck -->
  <rect x="42" y="44" width="36" height="12" rx="4" fill="#D8E8EC"/>
  <rect x="42" y="44" width="36" height="12" rx="4" fill="none" stroke="#B0C8D0" stroke-width="1.5"/>
  <!-- lid -->
  <rect x="38" y="34" width="44" height="14" rx="7" fill="#D4A030"/>
  <rect x="40" y="36" width="40" height="10" rx="6" fill="#E8B840"/>
  <!-- lid highlight -->
  <rect x="44" y="38" width="32" height="4" rx="3" fill="#F0CC60" opacity="0.5"/>
  <!-- jar shine -->
  <path d="M44 58 Q46 65 44 76" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
  <ellipse cx="50" cy="56" rx="4" ry="2" fill="#fff" opacity="0.3"/>
  <!-- label on jar -->
  <rect x="42" y="76" width="36" height="18" rx="4" fill="#fff" opacity="0.8"/>
  <line x1="46" y1="82" x2="74" y2="82" stroke="#E8A020" stroke-width="2"/>
  <line x1="46" y1="87" x2="74" y2="87" stroke="#E8A020" stroke-width="1.5"/>
  <line x1="46" y1="91" x2="68" y2="91" stroke="#E8A020" stroke-width="1.5"/>
</svg>
