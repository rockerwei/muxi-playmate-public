<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="一顆橘色橘子">
  <title>Orange</title>
  <ellipse cx="60" cy="107" rx="28" ry="7" fill="rgba(0,0,0,0.10)"/>
  <!-- orange body -->
  <circle cx="60" cy="66" r="38" fill="#F5891A"/>
  <!-- shade bottom -->
  <ellipse cx="60" cy="84" rx="30" ry="20" fill="#D97010" opacity="0.35"/>
