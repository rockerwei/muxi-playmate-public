  <circle cx="48" cy="56" r="3" fill="#E07814" opacity="0.5"/>
  <circle cx="68" cy="52" r="3" fill="#E07814" opacity="0.5"/>
  <circle cx="74" cy="66" r="3" fill="#E07814" opacity="0.5"/>
  <circle cx="52" cy="74" r="3" fill="#E07814" opacity="0.5"/>
  <circle cx="40" cy="70" r="2.5" fill="#E07814" opacity="0.4"/>
