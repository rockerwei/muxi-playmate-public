<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="一朵粉紅色花朵">
  <title>Flower</title>
  <ellipse cx="60" cy="110" rx="10" ry="5" fill="rgba(0,0,0,0.10)"/>
  <!-- stem -->
  <rect x="56" y="78" width="8" height="32" rx="4" fill="#4CAF50"/>
  <!-- leaf left -->
  <ellipse cx="44" cy="88" rx="16" ry="8" fill="#66BB6A" transform="rotate(-30 44 88)"/>
  <!-- leaf right -->
  <ellipse cx="76" cy="88" rx="16" ry="8" fill="#66BB6A" transform="rotate(30 76 88)"/>
  <!-- petals -->
  <ellipse cx="60" cy="36" rx="12" ry="18" fill="#F48FB1"/>
  <ellipse cx="60" cy="36" rx="12" ry="18" fill="#F48FB1" transform="rotate(45 60 60)"/>
  <ellipse cx="60" cy="36" rx="12" ry="18" fill="#F48FB1" transform="rotate(90 60 60)"/>
  <ellipse cx="60" cy="36" rx="12" ry="18" fill="#F48FB1" transform="rotate(135 60 60)"/>
  <!-- petal highlights -->
  <ellipse cx="60" cy="36" rx="12" ry="18" fill="#F8BBD9" transform="rotate(22.5 60 60)" opacity="0.6"/>
  <ellipse cx="60" cy="36" rx="12" ry="18" fill="#F8BBD9" transform="rotate(67.5 60 60)" opacity="0.6"/>
  <ellipse cx="60" cy="36" rx="12" ry="18" fill="#F8BBD9" transform="rotate(112.5 60 60)" opacity="0.6"/>
  <ellipse cx="60" cy="36" rx="12" ry="18" fill="#F8BBD9" transform="rotate(157.5 60 60)" opacity="0.6"/>
  <!-- center -->
  <circle cx="60" cy="60" r="16" fill="#FFD600"/>
  <circle cx="60" cy="60" r="10" fill="#FFC107"/>
  <!-- center texture dots -->
  <circle cx="55" cy="56" r="2" fill="#FF8F00" opacity="0.6"/>
  <circle cx="65" cy="56" r="2" fill="#FF8F00" opacity="0.6"/>
  <circle cx="60" cy="65" r="2" fill="#FF8F00" opacity="0.6"/>
</svg>
