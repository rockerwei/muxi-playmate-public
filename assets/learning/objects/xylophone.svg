<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="一個木琴">
  <title>Xylophone</title>
  <ellipse cx="60" cy="112" rx="42" ry="5" fill="rgba(0,0,0,0.10)"/>
  <!-- frame bottom rails -->
  <rect x="10" y="92" width="100" height="8" rx="4" fill="#8B5A2B"/>
  <!-- left leg -->
  <rect x="14" y="92" width="8" height="14" rx="3" fill="#6B4020"/>
  <!-- right leg -->
  <rect x="98" y="92" width="8" height="14" rx="3" fill="#6B4020"/>
  <!-- bars side by side (7 bars, descending height = ascending pitch) -->
  <!-- bar 1: purple (longest/lowest, leftmost) -->
  <rect x="12" y="38" width="13" height="58" rx="5" fill="#9030D0"/>
  <rect x="14" y="40" width="9" height="4" rx="2" fill="#B050F0" opacity="0.5"/>
  <!-- bar 2: blue -->
  <rect x="27" y="44" width="13" height="52" rx="5" fill="#3060E0"/>
  <rect x="29" y="46" width="9" height="4" rx="2" fill="#5080F0" opacity="0.5"/>
  <!-- bar 3: green -->
  <rect x="42" y="50" width="13" height="46" rx="5" fill="#30B030"/>
  <rect x="44" y="52" width="9" height="4" rx="2" fill="#50D050" opacity="0.5"/>
  <!-- bar 4: yellow -->
  <rect x="57" y="56" width="13" height="40" rx="5" fill="#FFD700"/>
  <rect x="59" y="58" width="9" height="4" rx="2" fill="#FFE840" opacity="0.5"/>
  <!-- bar 5: orange -->
  <rect x="72" y="62" width="13" height="34" rx="5" fill="#F07828"/>
  <rect x="74" y="64" width="9" height="4" rx="2" fill="#F09848" opacity="0.5"/>
  <!-- bar 6: red -->
  <rect x="87" y="68" width="13" height="28" rx="5" fill="#E03030"/>
  <rect x="89" y="70" width="9" height="4" rx="2" fill="#F05050" opacity="0.5"/>
  <!-- mallets -->
  <!-- mallet 1 (left) -->
  <line x1="30" y1="30" x2="42" y2="50" stroke="#8B5A2B" stroke-width="3" stroke-linecap="round"/>
  <circle cx="28" cy="26" r="7" fill="#FF6060"/>
  <!-- mallet 2 (right) -->
  <line x1="86" y1="32" x2="74" y2="52" stroke="#8B5A2B" stroke-width="3" stroke-linecap="round"/>
  <circle cx="88" cy="28" r="7" fill="#6060FF"/>
  <!-- music notes floating -->
  <text x="52" y="28" font-size="14" fill="#FFD700" opacity="0.8">♪</text>
  <text x="66" y="22" font-size="12" fill="#FF6090" opacity="0.7">♫</text>
</svg>
