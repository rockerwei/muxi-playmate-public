<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="一輛紅色小汽車">
  <title>Car</title>
  <!-- shadow -->
  <ellipse cx="60" cy="108" rx="42" ry="6" fill="rgba(0,0,0,0.12)"/>
  <!-- car body lower -->
  <rect x="10" y="72" width="100" height="28" rx="8" fill="#EF5350"/>
  <!-- car body upper (cabin) -->
  <path d="M30 72 Q36 48 50 44 L70 44 Q84 44 90 72 Z" fill="#E53935"/>
  <!-- windows -->
  <path d="M36 70 Q40 52 50 48 L60 48 L60 70 Z" fill="#90CAF9"/>
  <path d="M84 70 Q80 52 70 48 L60 48 L60 70 Z" fill="#90CAF9"/>
  <!-- window divider -->
  <line x1="60" y1="48" x2="60" y2="70" stroke="#E53935" stroke-width="3"/>
  <!-- door line -->
  <line x1="60" y1="70" x2="60" y2="100" stroke="#C62828" stroke-width="2"/>
  <!-- door handle left -->
  <rect x="44" y="82" width="10" height="4" rx="2" fill="#C62828"/>
  <!-- door handle right -->
  <rect x="66" y="82" width="10" height="4" rx="2" fill="#C62828"/>
  <!-- wheels -->
  <circle cx="32" cy="100" r="14" fill="#424242"/>
  <circle cx="88" cy="100" r="14" fill="#424242"/>
  <circle cx="32" cy="100" r="9" fill="#757575"/>
  <circle cx="88" cy="100" r="9" fill="#757575"/>
  <circle cx="32" cy="100" r="4" fill="#BDBDBD"/>
  <circle cx="88" cy="100" r="4" fill="#BDBDBD"/>
  <!-- headlights -->
  <rect x="10" y="76" width="10" height="8" rx="3" fill="#FFF9C4"/>
  <rect x="100" y="76" width="10" height="8" rx="3" fill="#FFF9C4"/>
</svg>
