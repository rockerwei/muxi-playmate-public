<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="一個鳥巢">
  <title>Nest</title>
  <ellipse cx="60" cy="108" rx="30" ry="6" fill="rgba(0,0,0,0.10)"/>
  <!-- branch -->
  <path d="M10 84 Q40 80 80 82 Q100 82 112 84" stroke="#6B4423" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- leaves on branch -->
  <ellipse cx="24" cy="76" rx="10" ry="5" fill="#4a9030" transform="rotate(-20 24 76)"/>
  <ellipse cx="100" cy="76" rx="10" ry="5" fill="#4a9030" transform="rotate(15 100 76)"/>
  <!-- nest outer (twigs, darker) -->
  <ellipse cx="60" cy="80" rx="36" ry="18" fill="#8B5A2B"/>
  <!-- twig lines outer -->
  <path d="M26 76 Q36 68 48 74 Q56 78 60 76 Q64 74 72 78 Q84 82 94 76" stroke="#6B4423" stroke-width="2" fill="none"/>
  <path d="M28 82 Q38 74 52 80 Q60 84 60 82 Q60 80 68 76 Q80 70 92 78" stroke="#6B4423" stroke-width="2" fill="none"/>
  <path d="M30 88 Q42 82 56 86 Q60 88 64 86 Q78 82 90 86" stroke="#7B5230" stroke-width="1.5" fill="none"/>
  <!-- nest inner (lighter bowl) -->
  <ellipse cx="60" cy="76" rx="26" ry="12" fill="#C49A6C"/>
  <!-- soft lining -->
  <ellipse cx="60" cy="74" rx="20" ry="9" fill="#E8CBA0"/>
  <!-- eggs -->
  <ellipse cx="52" cy="70" rx="8" ry="6" fill="#A8D8F0"/>
  <ellipse cx="68" cy="70" rx="8" ry="6" fill="#B8E0A0"/>
  <ellipse cx="60" cy="68" rx="7" ry="5" fill="#F8E0B0"/>
  <!-- egg spots/dots -->
  <circle cx="50" cy="69" r="2" fill="#88B8D0" opacity="0.5"/>
  <circle cx="54" cy="72" r="1.5" fill="#88B8D0" opacity="0.5"/>
  <circle cx="66" cy="68" r="2" fill="#98C090" opacity="0.5"/>
  <circle cx="70" cy="72" r="1.5" fill="#98C090" opacity="0.5"/>
</svg>
