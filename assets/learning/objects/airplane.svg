<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="一架藍色飛機">
  <title>Airplane</title>
  <ellipse cx="60" cy="108" rx="32" ry="5" fill="rgba(0,0,0,0.10)"/>
  <!-- fuselage (body) -->
  <ellipse cx="60" cy="64" rx="40" ry="14" fill="#1976D2" transform="rotate(-10 60 64)"/>
  <!-- nose -->
  <ellipse cx="94" cy="56" rx="14" ry="10" fill="#1565C0" transform="rotate(-10 94 56)"/>
  <!-- cockpit window -->
  <ellipse cx="88" cy="52" rx="8" ry="6" fill="#90CAF9" transform="rotate(-10 88 52)"/>
  <!-- main wings -->
  <ellipse cx="56" cy="62" rx="38" ry="12" fill="#42A5F5" transform="rotate(70 56 62)"/>
  <!-- tail wing horizontal -->
  <ellipse cx="26" cy="70" rx="18" ry="7" fill="#1976D2" transform="rotate(-5 26 70)"/>
  <!-- tail wing vertical -->
  <ellipse cx="26" cy="60" rx="6" ry="14" fill="#1565C0" transform="rotate(-5 26 60)"/>
  <!-- windows row -->
  <circle cx="72" cy="59" r="4" fill="#BBDEFB"/>
  <circle cx="62" cy="62" r="4" fill="#BBDEFB"/>
  <circle cx="52" cy="65" r="4" fill="#BBDEFB"/>
  <!-- engine -->
  <ellipse cx="60" cy="78" rx="10" ry="6" fill="#0D47A1"/>
  <ellipse cx="60" cy="77" rx="8" ry="4" fill="#1565C0"/>
</svg>
