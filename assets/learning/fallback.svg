<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="學習圖片">
  <title>學習圖片</title>
  <!-- picture frame -->
  <rect x="10" y="10" width="100" height="100" rx="14" fill="#E8E4F0"/>
  <rect x="14" y="14" width="92" height="92" rx="11" fill="#F0EDF8"/>
  <!-- landscape scene inside frame -->
  <!-- sky -->
  <rect x="14" y="14" width="92" height="55" rx="11" fill="#CCE8FF"/>
  <!-- sun -->
  <circle cx="88" cy="30" r="10" fill="#FFE040"/>
  <!-- clouds -->
  <ellipse cx="42" cy="28" rx="14" ry="8" fill="#ffffff"/>
  <ellipse cx="56" cy="26" rx="10" ry="7" fill="#ffffff"/>
  <!-- ground -->
  <rect x="14" y="68" width="92" height="38" rx="0" fill="#A8D880"/>
  <rect x="14" y="68" width="92" height="8" fill="#88C860"/>
  <!-- tree -->
  <rect x="54" y="60" width="8" height="22" rx="3" fill="#8B5A2B"/>
  <circle cx="58" cy="55" r="18" fill="#50A830"/>
  <circle cx="46" cy="60" r="12" fill="#60B840"/>
  <circle cx="70" cy="60" r="12" fill="#60B840"/>
  <!-- bottom frame border -->
  <rect x="10" y="10" width="100" height="100" rx="14" fill="none" stroke="#C8B8E0" stroke-width="3"/>
  <!-- camera icon overlay (subtle) -->
  <rect x="42" y="88" width="36" height="16" rx="4" fill="#9878C8" opacity="0.3"/>
  <circle cx="60" cy="96" r="5" fill="#9878C8" opacity="0.3"/>
</svg>
