<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="一隻黃色小鴨">
  <title>Duck</title>
  <ellipse cx="60" cy="108" rx="26" ry="6" fill="rgba(0,0,0,0.10)"/>
  <!-- body -->
  <ellipse cx="58" cy="82" rx="32" ry="26" fill="#FFD600"/>
  <!-- wing detail -->
  <ellipse cx="46" cy="84" rx="14" ry="10" fill="#FFC107" transform="rotate(-10 46 84)"/>
  <!-- neck -->
  <ellipse cx="60" cy="58" rx="14" ry="16" fill="#FFD600"/>
  <!-- head -->
  <circle cx="60" cy="44" r="20" fill="#FFD600"/>
  <!-- bill -->
  <ellipse cx="76" cy="48" rx="12" ry="7" fill="#FF8F00"/>
  <ellipse cx="76" cy="46" rx="10" ry="4" fill="#FFA000"/>
  <!-- eye -->
  <circle cx="66" cy="40" r="5" fill="#fff"/>
  <circle cx="67" cy="40" r="3" fill="#1a1a2e"/>
  <circle cx="68" cy="39" r="1" fill="#fff"/>
  <!-- eyebrow -->
  <path d="M62 35 Q66 32 70 35" stroke="#CC8A00" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- tail feather -->
  <path d="M28 72 Q14 60 18 48" stroke="#FFD600" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M26 70 Q12 58 16 46" stroke="#FFC107" stroke-width="5" fill="none" stroke-linecap="round"/>
</svg>
