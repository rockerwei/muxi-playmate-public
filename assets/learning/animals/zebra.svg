<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="一隻斑馬">
  <title>Zebra</title>
  <ellipse cx="60" cy="110" rx="28" ry="6" fill="rgba(0,0,0,0.10)"/>
  <!-- ears -->
  <path d="M44 28 L40 12 L54 24 Z" fill="#f0f0f0"/>
  <path d="M76 28 L80 12 L66 24 Z" fill="#f0f0f0"/>
  <path d="M44 27 L41 15 L52 24 Z" fill="#1a1a1a"/>
  <path d="M76 27 L79 15 L68 24 Z" fill="#1a1a1a"/>
  <!-- mane -->
  <rect x="52" y="22" width="16" height="14" rx="3" fill="#1a1a1a"/>
  <!-- body -->
  <ellipse cx="60" cy="83" rx="30" ry="22" fill="#f0f0f0"/>
  <!-- body stripes -->
  <path d="M46 68 Q52 64 52 74" stroke="#1a1a1a" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M42 78 Q48 74 48 84" stroke="#1a1a1a" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M60 66 Q60 62 60 72" stroke="#1a1a1a" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M74 68 Q68 64 68 74" stroke="#1a1a1a" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M78 78 Q72 74 72 84" stroke="#1a1a1a" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- head -->
  <ellipse cx="60" cy="46" rx="22" ry="20" fill="#f0f0f0"/>
  <!-- head stripes -->
  <path d="M46 36 Q50 40 46 46" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M74 36 Q70 40 74 46" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M55 28 Q57 34 55 38" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M65 28 Q63 34 65 38" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- eyes -->
  <circle cx="48" cy="44" r="5" fill="#fff"/>
  <circle cx="72" cy="44" r="5" fill="#fff"/>
  <circle cx="49" cy="44" r="3" fill="#1a1a1a"/>
  <circle cx="73" cy="44" r="3" fill="#1a1a1a"/>
  <circle cx="50" cy="43" r="1" fill="#fff"/>
  <circle cx="74" cy="43" r="1" fill="#fff"/>
  <!-- nose -->
  <ellipse cx="60" cy="58" rx="10" ry="7" fill="#E0D0C0"/>
  <circle cx="56" cy="58" r="2.5" fill="#8a7060"/>
  <circle cx="64" cy="58" r="2.5" fill="#8a7060"/>
  <!-- legs -->
  <rect x="38" y="102" width="10" height="10" rx="3" fill="#f0f0f0"/>
  <rect x="52" y="102" width="10" height="10" rx="3" fill="#f0f0f0"/>
  <rect x="58" y="102" width="10" height="10" rx="3" fill="#f0f0f0"/>
  <rect x="72" y="102" width="10" height="10" rx="3" fill="#f0f0f0"/>
  <!-- leg stripes -->
  <rect x="38" y="104" width="10" height="3" fill="#1a1a1a"/>
  <rect x="52" y="104" width="10" height="3" fill="#1a1a1a"/>
  <rect x="58" y="106" width="10" height="3" fill="#1a1a1a"/>
  <rect x="72" y="104" width="10" height="3" fill="#1a1a1a"/>
  <!-- hooves -->
  <rect x="38" y="109" width="10" height="3" rx="2" fill="#3a3a3a"/>
  <rect x="52" y="109" width="10" height="3" rx="2" fill="#3a3a3a"/>
  <rect x="58" y="109" width="10" height="3" rx="2" fill="#3a3a3a"/>
  <rect x="72" y="109" width="10" height="3" rx="2" fill="#3a3a3a"/>
</svg>
