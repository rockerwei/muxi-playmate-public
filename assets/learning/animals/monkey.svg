<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="一隻棕色猴子">
  <title>Monkey</title>
  <ellipse cx="60" cy="110" rx="26" ry="6" fill="rgba(0,0,0,0.10)"/>
  <!-- ears -->
  <circle cx="30" cy="50" r="14" fill="#8D6E63"/>
  <circle cx="90" cy="50" r="14" fill="#8D6E63"/>
  <circle cx="30" cy="50" r="9" fill="#F48FB1"/>
  <circle cx="90" cy="50" r="9" fill="#F48FB1"/>
  <!-- body -->
  <ellipse cx="60" cy="86" rx="26" ry="22" fill="#8D6E63"/>
  <!-- tail -->
  <path d="M86 90 Q104 80 108 62 Q112 44 100 40" stroke="#8D6E63" stroke-width="9" fill="none" stroke-linecap="round"/>
  <!-- head -->
  <circle cx="60" cy="52" r="28" fill="#8D6E63"/>
  <!-- face disc -->
  <ellipse cx="60" cy="60" rx="20" ry="17" fill="#FFCC80"/>
  <!-- eyes -->
  <circle cx="48" cy="48" r="6" fill="#fff"/>
  <circle cx="72" cy="48" r="6" fill="#fff"/>
  <circle cx="49" cy="48" r="4" fill="#3a2a1a"/>
  <circle cx="73" cy="48" r="4" fill="#3a2a1a"/>
  <circle cx="50" cy="47" r="1.5" fill="#fff"/>
  <circle cx="74" cy="47" r="1.5" fill="#fff"/>
  <!-- nose -->
  <ellipse cx="60" cy="60" rx="5" ry="4" fill="#FF8A65"/>
  <circle cx="57" cy="59" r="2" fill="#BF360C"/>
  <circle cx="63" cy="59" r="2" fill="#BF360C"/>
  <!-- smile -->
  <path d="M50 68 Q60 76 70 68" stroke="#6D4C41" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- tummy -->
  <ellipse cx="60" cy="90" rx="14" ry="12" fill="#FFCC80"/>
</svg>
