<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="一隻棕色小馬">
  <title>Horse</title>
  <ellipse cx="60" cy="110" rx="30" ry="6" fill="rgba(0,0,0,0.10)"/>
  <!-- body -->
  <ellipse cx="62" cy="80" rx="34" ry="24" fill="#A0785A"/>
  <!-- legs -->
  <rect x="38" y="96" width="10" height="16" rx="5" fill="#8D6748"/>
  <rect x="52" y="98" width="10" height="14" rx="5" fill="#8D6748"/>
  <rect x="66" y="98" width="10" height="14" rx="5" fill="#8D6748"/>
  <rect x="80" y="96" width="10" height="16" rx="5" fill="#8D6748"/>
  <!-- hooves -->
  <ellipse cx="43" cy="112" rx="6" ry="3" fill="#5D4037"/>
  <ellipse cx="57" cy="112" rx="6" ry="3" fill="#5D4037"/>
  <ellipse cx="71" cy="112" rx="6" ry="3" fill="#5D4037"/>
  <ellipse cx="85" cy="112" rx="6" ry="3" fill="#5D4037"/>
  <!-- neck -->
  <ellipse cx="36" cy="66" rx="14" ry="20" fill="#A0785A" transform="rotate(-20 36 66)"/>
  <!-- head -->
  <ellipse cx="26" cy="44" rx="18" ry="22" fill="#A0785A" transform="rotate(-10 26 44)"/>
  <!-- muzzle -->
  <ellipse cx="18" cy="56" rx="10" ry="8" fill="#C49A78"/>
  <!-- nostril -->
  <circle cx="14" cy="56" r="3" fill="#8D6748"/>
  <!-- eye -->
  <circle cx="28" cy="40" r="5" fill="#fff"/>
  <circle cx="29" cy="40" r="3" fill="#3a2a1a"/>
  <circle cx="30" cy="39" r="1" fill="#fff"/>
  <!-- mane -->
  <path d="M28 26 Q36 22 38 36 Q40 44 36 52" stroke="#5D4037" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M30 26 Q38 22 40 36 Q42 44 38 52" stroke="#795548" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- tail -->
  <path d="M96 72 Q110 60 108 46" stroke="#5D4037" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M96 72 Q112 58 110 44" stroke="#795548" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
