<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="一隻棕色小狗">
  <title>Dog</title>
  <ellipse cx="60" cy="108" rx="28" ry="7" fill="rgba(0,0,0,0.10)"/>
  <!-- ears -->
  <ellipse cx="38" cy="42" rx="14" ry="18" fill="#8B5E3C" transform="rotate(-15 38 42)"/>
  <ellipse cx="82" cy="42" rx="14" ry="18" fill="#8B5E3C" transform="rotate(15 82 42)"/>
  <ellipse cx="38" cy="44" rx="9" ry="13" fill="#C47C4E" transform="rotate(-15 38 44)"/>
  <ellipse cx="82" cy="44" rx="9" ry="13" fill="#C47C4E" transform="rotate(15 82 44)"/>
  <!-- body -->
  <ellipse cx="60" cy="82" rx="30" ry="22" fill="#C47C4E"/>
  <!-- head -->
  <circle cx="60" cy="52" r="24" fill="#C47C4E"/>
  <!-- face highlight -->
  <ellipse cx="60" cy="60" rx="14" ry="10" fill="#E8A87C"/>
  <!-- eyes -->
  <circle cx="50" cy="46" r="5" fill="#fff"/>
  <circle cx="70" cy="46" r="5" fill="#fff"/>
  <circle cx="51" cy="46" r="3" fill="#3a2a1a"/>
  <circle cx="71" cy="46" r="3" fill="#3a2a1a"/>
  <circle cx="52" cy="45" r="1" fill="#fff"/>
  <circle cx="72" cy="45" r="1" fill="#fff"/>
  <!-- nose -->
  <ellipse cx="60" cy="58" rx="6" ry="4" fill="#3a2a1a"/>
  <ellipse cx="59" cy="57" rx="2" ry="1" fill="#6a5a4a"/>
  <!-- mouth -->
  <path d="M55 63 Q60 68 65 63" stroke="#3a2a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- tail -->
  <path d="M88 75 Q102 60 98 48" stroke="#C47C4E" stroke-width="7" fill="none" stroke-linecap="round"/>
</svg>
