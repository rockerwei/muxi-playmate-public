<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="一隻熊貓">
  <title>Panda</title>
  <ellipse cx="60" cy="108" rx="30" ry="7" fill="rgba(0,0,0,0.10)"/>
  <!-- ears -->
  <circle cx="36" cy="26" r="14" fill="#2a2a2a"/>
  <circle cx="84" cy="26" r="14" fill="#2a2a2a"/>
  <!-- body -->
  <ellipse cx="60" cy="88" rx="32" ry="24" fill="#f0f0f0"/>
  <!-- arm patches -->
  <ellipse cx="28" cy="84" rx="14" ry="10" fill="#2a2a2a"/>
  <ellipse cx="92" cy="84" rx="14" ry="10" fill="#2a2a2a"/>
  <!-- head -->
  <circle cx="60" cy="50" r="28" fill="#f0f0f0"/>
  <!-- eye patches -->
  <ellipse cx="46" cy="46" rx="12" ry="10" fill="#2a2a2a" transform="rotate(-15 46 46)"/>
  <ellipse cx="74" cy="46" rx="12" ry="10" fill="#2a2a2a" transform="rotate(15 74 46)"/>
  <!-- eyes -->
  <circle cx="46" cy="46" r="6" fill="#fff"/>
  <circle cx="74" cy="46" r="6" fill="#fff"/>
  <circle cx="47" cy="46" r="4" fill="#2a2a2a"/>
  <circle cx="75" cy="46" r="4" fill="#2a2a2a"/>
  <circle cx="48" cy="45" r="1.5" fill="#fff"/>
  <circle cx="76" cy="45" r="1.5" fill="#fff"/>
  <!-- nose -->
  <ellipse cx="60" cy="60" rx="6" ry="4" fill="#2a2a2a"/>
  <!-- mouth -->
  <path d="M55 65 Q60 70 65 65" stroke="#2a2a2a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- cheeks -->
  <ellipse cx="42" cy="60" rx="7" ry="5" fill="#ffd6d6" opacity="0.5"/>
  <ellipse cx="78" cy="60" rx="7" ry="5" fill="#ffd6d6" opacity="0.5"/>
  <!-- bamboo hint -->
  <rect x="85" y="76" width="8" height="28" rx="3" fill="#6aaa44"/>
  <line x1="85" y1="84" x2="93" y2="84" stroke="#5a9438" stroke-width="2"/>
  <line x1="85" y1="92" x2="93" y2="92" stroke="#5a9438" stroke-width="2"/>
</svg>
