<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#8B5CF6" />
    <title>目前離線 | Muxi Playmate</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fafaf8;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom)
          env(safe-area-inset-left);
      }
      .card {
        text-align: center;
        padding: 2rem;
        max-width: 360px;
      }
      .icon {
        font-size: 4rem;
        margin-bottom: 1rem;
      }
      h1 {
        color: #8b5cf6;
        font-size: 1.5rem;
        margin-bottom: 0.75rem;
      }
      p {
        color: #6b7280;
        line-height: 1.6;
      }
      button {
        margin-top: 1.5rem;
        padding: 0.75rem 2rem;
        background: #8b5cf6;
        color: white;
        border: none;
        border-radius: 9999px;
        font-size: 1rem;
        cursor: pointer;
        min-height: 44px;
        touch-action: manipulation;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">📚</div>
      <h1>目前沒有網路連線</h1>
      <p>請確認網路連線後再試一次，已下載的內容仍可繼續使用。</p>
      <button onclick="window.location.reload()">重新連線</button>
    </div>
  </body>
</html>
